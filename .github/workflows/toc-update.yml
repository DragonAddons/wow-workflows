name: TOC Update (reusable)

on:
  workflow_call:
    inputs:
      flavors:
        description: |-
          Space-separated list of game flavors to check.
          Valid: retail, classic, vanilla, tbc
        required: false
        type: string
        default: "retail classic vanilla tbc"
      base-branch:
        description: "Base branch for the PR"
        required: false
        type: string
        default: "master"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-toc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.base-branch }}

      - name: Fetch update script
        shell: bash
        run: |
          mkdir -p scripts
          curl -sSfL \
            "https://raw.githubusercontent.com/DragonAddons/wow-workflows/main/scripts/update_toc_versions.sh" \
            -o scripts/update_toc_versions.sh
          chmod +x scripts/update_toc_versions.sh

      # Build --flavor args from the space-separated input and run the updater
      - name: Update TOC versions
        shell: bash
        env:
          FLAVORS: ${{ inputs.flavors }}
        run: |
          args=()
          for flavor in $FLAVORS; do
            args+=(--flavor "$flavor")
          done
          bash scripts/update_toc_versions.sh "${args[@]}"

      # Detect whether any .toc files were modified by the update script
      - name: Check for changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No TOC changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "TOC changes detected:"
            git diff --name-only
          fi

      # Open a PR (or force-push to an existing one) with the updated TOC files
      - name: Create or update PR
        if: steps.diff.outputs.has_changes == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/toc-interface-version"
          TITLE="chore: update TOC Interface versions"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create or switch to the update branch
          git checkout -B "$BRANCH"

          # Stage and commit changes
          git add -A '*.toc'
          git commit -m "$TITLE"

          # Force-push the branch (overwrites previous auto-update if still open)
          git push --force-with-lease origin "$BRANCH"

          # Ensure the automated label exists
          gh label create "automated" --description "Auto-generated changes" --color "ededed" 2>/dev/null || true

          # Create PR if one doesn't exist, otherwise the existing PR auto-updates
          if ! gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --base "${{ inputs.base-branch }}" \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Automated update of \`## Interface\` versions in TOC files based on latest Blizzard CDN data." \
              --label "automated"
          else
            echo "PR already exists for branch ${BRANCH}, force-push updated it"
          fi
